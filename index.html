<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Food Fetch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
        /* Mobile-first base styles & layout fixes */
        :root {
            --bg: #050816;
            --card-bg: #0b1020;
            --accent: #ffb703;
            --accent-soft: #23d5ab;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
            color: var(--text-main);
        }

        .home-page {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1.5rem;
        }

        canvas#starCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Header */
        .header-section {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(18px);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(15,23,42,0.96), rgba(30,64,175,0.88));
            box-shadow: 0 18px 60px rgba(15,23,42,0.65);
        }

        .foodie-fetch-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .foodie-fetch-logo img {
            width: 32px;
            height: 32px;
            border-radius: 0.75rem;
        }

        .foodie-fetch-logo-text {
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.04em;
            font-size: 1rem;
        }

        .github-section {
            display: flex;
            align-items: center;
        }

        .github-section a {
            text-decoration: none;
        }

        .github {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,0.6);
            background: radial-gradient(circle at top left, rgba(56,189,248,0.24), rgba(15,23,42,0.98));
            color: var(--text-main);
            font-size: 0.8rem;
            cursor: pointer;
            min-height: 40px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .github:hover {
            transform: translateY(-1px);
            border-color: rgba(248,250,252,0.85);
            box-shadow: 0 14px 35px rgba(59,130,246,0.45);
        }

        .github i {
            font-size: 1rem;
        }

        .github-p {
            margin: 0;
            white-space: nowrap;
        }

        /* Main hero & search */
        .main-section {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .main {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .main h1 {
            font-size: clamp(1.8rem, 4vw, 2.7rem);
            line-height: 1.15;
            margin: 0;
        }

        .variant-color {
            color: var(--accent-soft);
        }

        .variant-color-2 {
            color: var(--accent);
        }

        .quote-container {
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            background: radial-gradient(circle at top left, rgba(56,189,248,0.18), rgba(15,23,42,0.96));
            border: 1px solid rgba(55,65,81,0.8);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .quote {
            margin: 0;
            display: flex;
            align-items: flex-start;
            gap: 0.25rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .quote-mark {
            color: var(--accent-soft);
        }

        .author {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .bigger-input-container {
            margin-top: 0.5rem;
        }

        .input-section {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.45rem;
            border-radius: 999px;
            background: rgba(15,23,42,0.96);
            border: 1px solid rgba(148,163,184,0.65);
            box-shadow: 0 16px 45px rgba(15,23,42,0.85);
        }

        .search-btn img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        #text-input {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 0.95rem;
            padding: 0.45rem 0.2rem;
            outline: none;
        }

        #text-input::placeholder {
            color: rgba(148,163,184,0.9);
        }

        #search-btn {
            border: none;
            border-radius: 999px;
            padding: 0.4rem 0.95rem;
            background: linear-gradient(135deg, #f97316, #eab308);
            color: #111827;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            min-height: 36px;
            box-shadow: 0 12px 30px rgba(234,179,8,0.55);
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        #search-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
            box-shadow: 0 18px 45px rgba(249,115,22,0.7);
        }

        /* Loading dots centered under input */
        .loading-container {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 0.25rem;
            margin-top: 0.75rem;
        }

        .loading-container .dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--accent-soft);
            animation: bounce 0.9s infinite ease-in-out;
        }

        .loading-container .dot:nth-child(2) {
            animation-delay: 0.12s;
        }

        .loading-container .dot:nth-child(3) {
            animation-delay: 0.24s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* Results grid */
        #result-container {
            max-width: 1100px;
            margin: 1.5rem auto 0;
            width: 100%;
        }

        .result-heading {
            margin: 0 0 0.75rem;
            font-size: 1.15rem;
        }

        #result-message {
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .meal-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 1rem;
        }

        .meal-card {
            background: var(--card-bg);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(31,41,55,0.9);
            box-shadow: 0 16px 45px rgba(15,23,42,0.9);
            display: flex;
            flex-direction: column;
        }

        .meal-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .meal-card-body {
            padding: 0.85rem 0.9rem 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .meal-card-title {
            font-size: 1rem;
            margin: 0;
        }

        .meal-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .meal-card button {
            align-self: flex-start;
            margin-top: 0.35rem;
            border-radius: 999px;
            border: none;
            padding: 0.3rem 0.9rem;
            font-size: 0.8rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #052e16;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(15,23,42,0.82);
            backdrop-filter: blur(12px);
            z-index: 40;
        }

        .modal-content {
            width: 100%;
            max-width: 960px;
            max-height: 90vh;
            overflow-y: auto;
            background: #020617;
            border-radius: 1.25rem;
            border: 1px solid rgba(55,65,81,0.9);
            padding: 1.25rem 1.25rem 1.5rem;
            box-shadow: 0 30px 90px rgba(15,23,42,0.95);
        }

        .Heading1 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .Heading1 h1 {
            font-size: clamp(1.25rem, 3vw, 1.7rem);
            margin: 0;
        }

        #exit {
            border-radius: 999px;
            border: 1px solid rgba(55,65,81,0.9);
            background: rgba(15,23,42,0.98);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.3rem;
            cursor: pointer;
        }

        .Heading2 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
        }

        .Heading2 h2 {
            margin: 0;
            font-size: 1.05rem;
        }

        .divider-hidden {
            height: 1px;
            width: 100%;
            background: radial-gradient(circle at left, rgba(148,163,184,0.9), transparent 60%);
            margin: 0.85rem 0;
        }

        #Recipe-Detail {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .video-container-real h2 {
            margin: 0 0 0.5rem;
            font-size: 1.05rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(31,41,55,0.9);
            background: #020617;
        }

        .video-container iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* Lower section / footer */
        .lower-part {
            max-width: 1100px;
            margin: 2rem auto 0;
            width: 100%;
        }

        .foodie-fetch-logo-2 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .foodie-fetch-logo-2 img {
            width: 28px;
            height: 28px;
            border-radius: 0.75rem;
        }

        .foodie-fetch-logo-text-2 {
            margin: 0;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .divider {
            height: 1px;
            width: 100%;
            background: linear-gradient(90deg, transparent, rgba(148,163,184,0.9), transparent);
            margin-bottom: 0.75rem;
        }

        .footer footer {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .footer-text {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .variant-color-3 {
            color: var(--accent-soft);
            font-weight: 600;
        }

        .buy-me-a-coffee-container img {
            max-width: 160px;
            height: auto;
            display: block;
        }

        .contact-icons {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .contact-icons a {
            color: var(--text-muted);
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid rgba(55,65,81,0.85);
            background: rgba(15,23,42,0.95);
            transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
        }

        .contact-icons a:hover {
            border-color: rgba(250,250,250,0.92);
            color: var(--accent-soft);
            background: rgba(15,23,42,1);
        }

        /* Responsive tweaks */
        @media (min-width: 640px) {
            .home-page {
                padding-inline: 1.5rem;
            }

            .input-section {
                padding-inline: 0.75rem;
            }

            .footer footer {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

        @media (min-width: 768px) {
            .home-page {
                padding-top: 1.5rem;
            }

            .meal-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 1024px) {
            .meal-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 480px) {
            .header {
                padding-inline: 0.75rem;
            }

            .github-p {
                display: none;
            }

            .github {
                padding-inline: 0.7rem;
            }

            .input-section {
                border-radius: 1rem;
            }
        }
    </style>
    
</head>
<body>
   <div class="home-page">
    <canvas id="starCanvas"></canvas>
    <div class="header-section" id="header-section">
        <header class="header">
            <div class="foodie-fetch-logo">
                <img src="https://foodie-fetch.jeremy0x.codes/src/icons/apple-touch-icon.png" alt="ff-logo">
                <p class="foodie-fetch-logo-text">foodieFetch</p>
            </div>
            <div class="github-section">
               <a href="https://github.co/yourprofile">
                 <button class="github">
                <i class="fab fa-github"></i>
                    <p class="github-p">Star on Github</p>
                </button>
            </a>
            </div>
        </header>
    </div>
            <div class="main-section">
            <main class="main">
                <h1>Find <span class="variant-color">Recipes</span> with the <span class="variant-color-2">Ingredients</span> You Have! 🧅🍅</h1>
                <div class="quote-container">
                    <p class="quote">
                        <span class="quote-mark">❝</span> 
                        <span id="quote-text">
                    </span>
                        <span class="quote-mark">❞</span>
                    </p>
                    <div class="author">
                        <i class="fas fa-comments"></i> 
                        <span class="author-name" id="author-name"></span>
                    </div>
                </div>
                <div class="bigger-input-container">
                <div class="input-section">
                    <div class="search-btn">
                        <img src="/images/Screenshot_2025-03-01_165138-removebg-preview (1).png" alt="">
                    </div>
                    <input type="text" placeholder="Enter an ingredient to search recipes 🥗..." id="text-input">
                    <button id="search-btn">Search</button>
                </div>
                <div id="loading" class="loading-container">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
            </main>
            <div id="result-container">
                <h2 id="result-heading" class="result-heading"></h2> <!-- Heading for search results -->
                <div id="result-message"></div> <!-- Error or No Results message -->
                <div id="result" class="meal-grid"></div> <!-- Meal Grid -->
            </div>

            <div id="recipeModal" class="modal">

                <div class="modal-content">

                    <div class="Heading1">
                <h1 id="Recipe-Detail-heading" class="Recipe-Detail-heading"></h1> 
                <button id="exit">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M6 6L18 18M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                </button>
               </div>

                <div class="divider-hidden"></div>

                <div class="Heading2">
                <h2>Recipe Preparation 📝🍳</h2>
                <div>
                    <p>🍽️ Dessert</p>
                </div>
                </div>

                <div id="Recipe-Detail"></div>

                <div class="divider-hidden"></div>

                <div class="video-container-real">
                    <h2>Recipe Tutorial Video 🎥👨‍🍳</h2>
                    <div class="video-container">
                        <iframe id="recipe-video" src="" frameborder="0" allowfullscreen></iframe>
                    </div>
            </div>

            </div>
            </div>
        </div>
        <div class="lower-part">
        <div class="foodie-fetch-logo-2">
                <img src="https://foodie-fetch.jeremy0x.codes/src/icons/apple-touch-icon.png" alt="ff-logo">
               <p class="foodie-fetch-logo-text-2">foodieFetch</p>
        </div>
        <div class="divider"></div>
        <div class="footer">
            <footer>
                    <div class="footer-text">
                    <p><span>©</span> 2025 foodFetch <span class="tm-logo">™</span>. Developed by <span class="variant-color-3">Esther</span></p>
                </div>
                <div class="buy-me-a-coffee">
                    <div class="buy-me-a-coffee-container">
                    <a href="">
                            <img src="https://foodie-fetch.jeremy0x.codes/src/img/bmc-button.png">
                        </a>
                    </div>
                        </div>
                        <div class="contact-icons">
                            <a href="https://github.com/yourprofile" target="_blank"><i class="fab fa-github"></i></a>
                            <a href="https://twitter.com/yourprofile" target="_blank"><i class="fab fahttps://foodie-fetch.jeremy0x.codes/src/img/bmc-button.png" alt="Buy me a cofffe" class="buy-me-a-coffee-twitter"></i></a>
                            <a href="https://linkedin.com/in/yourprofile" target="_blank"><i class="fab fa-linkedin"></i></a>
                        </div>
                    </footer>
                </div>
            </div>
   </div>
   </div> 
   <script src="script.js"></script>
</body>
</html>
